<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <title>Saber-Weld SMAW - Kinetic Edition</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    
    <script>
      // CONFIGURACIÓN DE CONCEPTOS TÉCNICOS
      const DESAFIOS = [
        { word: "ZAT", hint: "ZONA AFECTADA TERMICAMENTE" },
        { word: "DC-", hint: "POLARIDAD DIRECTA" },
        { word: "DC+", hint: "POLARIDAD INVERSA" },
        { word: "E7016", hint: "ELECTRODO BASICO" },
        { word: "E6013", hint: "ELECTRODO RUTILO" },
        { word: "SMAW", hint: "SOLDADURA ARCO ELECTRODO" },
        { word: "111", hint: "CODIGO ISO SOLD. MANUAL" },
        { word: "WPS", hint: "ESPECIF. PROCEDIMIENTO" },
        { word: "AC", hint: "CORRIENTE ALTERNA" },
        { word: "BASICO", hint: "REVESTIMIENTO BAJO HIDROGENO" },
        { word: "RUTILO", hint: "REVESTIMIENTO DE TITANIO" },
        { word: "SAN", hint: "SOLDADURA ARCO CON NUCLEO" }
      ];

      let score = 0;
      let gameActive = false;
      let currentChallenge = null;

      AFRAME.registerComponent('game-engine', {
        init: function () {
          this.pizarra = document.querySelector('#hint-text');
          this.scoreText = document.querySelector('#score-text');
          this.startBtn = document.querySelector('#start-btn');
          
          // Soporte para click tradicional (ratón/gatillo)
          this.startBtn.addEventListener('click', () => {
            if (!gameActive) this.startGame();
          });
          
          // Detección por CONTACTO FÍSICO (Sable)
          this.el.addEventListener('raycaster-intersection', (evt) => {
            const intersectedEls = evt.detail.els;
            intersectedEls.forEach(el => {
              // Si tocamos un objetivo durante el juego
              if (gameActive && el.classList.contains('target-item')) {
                this.handleHit(el);
              }
              // Si tocamos el botón de inicio con el sable
              if (!gameActive && el.id === 'start-btn') {
                this.startGame();
              }
            });
          });
        },

        startGame: function() {
          gameActive = true;
          score = 0;
          this.scoreText.setAttribute('value', 'PUNTOS: 0');
          this.startBtn.setAttribute('visible', 'false');
          this.startBtn.setAttribute('scale', '0 0 0');
          this.startBtn.classList.remove('interactuable');
          this.nextChallenge();
        },

        nextChallenge: function() {
          if (!gameActive) return;
          currentChallenge = DESAFIOS[Math.floor(Math.random() * DESAFIOS.length)];
          this.pizarra.setAttribute('value', currentChallenge.hint);
          this.pizarra.setAttribute('color', '#f1c40f');
          this.spawnTargets();
        },

        spawnTargets: function() {
          const isCorrectLeft = Math.random() > 0.5;
          this.createTarget(currentChallenge.word, isCorrectLeft ? -1.0 : 1.0, true);
          
          let distractor;
          do {
            distractor = DESAFIOS[Math.floor(Math.random() * DESAFIOS.length)].word;
          } while (distractor === currentChallenge.word);
          
          this.createTarget(distractor, isCorrectLeft ? 1.0 : -1.0, false);
        },

        createTarget: function(label, xPos, isCorrect) {
          const target = document.createElement('a-entity');
          target.setAttribute('class', 'target-item'); 
          target.setAttribute('position', `${xPos} 1.3 -20`);
          target.dataset.correct = isCorrect;
          
          // El disco: Negro mate "Industrial"
          const body = document.createElement('a-cylinder');
          body.setAttribute('rotation', '90 0 0');
          body.setAttribute('radius', '0.35');
          body.setAttribute('height', '0.04');
          body.setAttribute('material', 'color', '#111111; metalness: 0.9; roughness: 0.1');
          
          // El texto: Amarillo fluorescente "incrustado"
          const text = document.createElement('a-text');
          text.setAttribute('value', label);
          text.setAttribute('align', 'center');
          text.setAttribute('width', '5');
          text.setAttribute('position', '0 0 0.025'); // Casi fundido con el disco
          text.setAttribute('color', '#f1c40f');
          // Añadimos un ligero brillo para que parezca luz grabada
          text.setAttribute('material', 'shader: flat; emissive: #f1c40f; emissiveIntensity: 0.5');
          text.setAttribute('font', 'exo2bold');

          target.appendChild(body);
          target.appendChild(text);

          target.setAttribute('animation', {
            property: 'position',
            to: `${xPos} 1.3 5`,
            dur: 7500, // Un pelín más lento para saborear el corte
            easing: 'linear'
          });

          this.el.appendChild(target);

          setTimeout(() => {
            if (target.parentNode) {
              target.parentNode.removeChild(target);
              if (isCorrect && gameActive && this.pizarra.getAttribute('value') === currentChallenge.hint) {
                this.pizarra.setAttribute('value', '¡FALLASTE!');
                this.pizarra.setAttribute('color', '#c0392b');
                setTimeout(() => this.nextChallenge(), 1500);
              }
            }
          }, 7600);
        },

        handleHit: function(targetEl) {
          const isCorrect = targetEl.dataset.correct === "true";
          
          if (isCorrect) {
            score += 10;
            this.scoreText.setAttribute('value', `PUNTOS: ${score}`);
            this.pizarra.setAttribute('value', '¡CORRECTO!');
            this.pizarra.setAttribute('color', '#27ae60');
            
            // Efecto visual de corte: El disco se encoge rápido
            targetEl.setAttribute('animation__hit', {property: 'scale', to: '1.5 0.1 1.5', dur: 100});
            setTimeout(() => this.cleanupTargets(), 150);
            setTimeout(() => this.nextChallenge(), 1000);
          } else {
            // Error: El disco se vuelve rojo y desaparece
            targetEl.setAttribute('material', 'color', '#c0392b');
            targetEl.setAttribute('animation__error', {property: 'scale', to: '0 0 0', dur: 200});
            score = Math.max(0, score - 5);
            this.scoreText.setAttribute('value', `PUNTOS: ${score}`);
            this.pizarra.setAttribute('value', 'ERROR');
            this.pizarra.setAttribute('color', '#c0392b');
          }
        },

        cleanupTargets: function() {
          const targets = document.querySelectorAll('.target-item');
          targets.forEach(t => {
            if (t.parentNode) t.parentNode.removeChild(t);
          });
        }
      });
    </script>
    <style>
      body { margin: 0; overflow: hidden; background-color: transparent; }
    </style>
  </head>
  <body>
    <a-scene 
      game-engine
      renderer="alpha: true; antialias: true; colorManagement: true;"
      webxr="optionalFeatures: hit-test, local-floor, passthrough;"
      cursor="rayOrigin: mouse"
      raycaster="objects: .interactuable">
      
      <a-sky visible="false"></a-sky>
      <a-light type="ambient" intensity="1.0"></a-light>
      <a-light type="directional" position="1 2 1" intensity="0.8"></a-light>

      <a-entity id="rig">
        <a-camera position="0 1.6 0">
          <a-cursor visible="false"></a-cursor>
        </a-camera>

        <!-- SABLE/ANTORCHA IZQUIERDA -->
        <a-entity id="leftHand" laser-controls="hand: left" raycaster="objects: .target-item, #start-btn; far: 1.2; showLine: false; interval: 10">
            <!-- Representación del sable: Cilindro con brillo de arco voltaico -->
            <a-cylinder position="0 0 -0.6" rotation="90 0 0" radius="0.01" height="1.2" material="color: #f1c40f; emissive: #f1c40f; emissiveIntensity: 3"></a-cylinder>
            <a-light type="point" color="#f1c40f" intensity="0.8" distance="3"></a-light>
        </a-entity>

        <!-- SABLE/ANTORCHA DERECHA -->
        <a-entity id="rightHand" laser-controls="hand: right" raycaster="objects: .target-item, #start-btn; far: 1.2; showLine: false; interval: 10">
            <a-cylinder position="0 0 -0.6" rotation="90 0 0" radius="0.01" height="1.2" material="color: #f1c40f; emissive: #f1c40f; emissiveIntensity: 3"></a-cylinder>
            <a-light type="point" color="#f1c40f" intensity="0.8" distance="3"></a-light>
        </a-entity>

        <!-- HAND TRACKING: Sables cortos que nacen de las palmas -->
        <a-entity hand-tracking-controls="hand: left" raycaster="objects: .target-item, #start-btn; far: 0.6; interval: 10">
             <a-cylinder position="0 0 -0.2" rotation="90 0 0" radius="0.008" height="0.4" material="color: #f1c40f; emissive: #f1c40f; emissiveIntensity: 2"></a-cylinder>
        </a-entity>
        <a-entity hand-tracking-controls="hand: right" raycaster="objects: .target-item, #start-btn; far: 0.6; interval: 10">
             <a-cylinder position="0 0 -0.2" rotation="90 0 0" radius="0.008" height="0.4" material="color: #f1c40f; emissive: #f1c40f; emissiveIntensity: 2"></a-cylinder>
        </a-entity>
      </a-entity>

      <!-- TERMINAL DE CONTROL -->
      <a-entity position="0 2.5 -3.5">
        <a-plane color="#000000" width="5.5" height="1.8" opacity="0.95" material="metalness: 0.5"></a-plane>
        
        <a-text value="SABER-WELD KINETIC" align="center" position="0 0.7 0.05" width="5.5" color="#f1c40f" font="exo2bold"></a-text>
        <a-plane position="0 0.55 0.06" width="4.5" height="0.01" color="#f1c40f"></a-plane>
        
        <a-text id="hint-text" value="CORTA EL BOTON PARA INICIAR" align="center" position="0 0.1 0.05" width="6.5" color="#FFFFFF"></a-text>
        <a-text id="score-text" value="PUNTOS: 0" align="center" position="0 -0.5 0.05" width="4.5" color="#f1c40f"></a-text>

        <!-- BOTÓN INICIO -->
        <a-entity id="start-btn" position="0 -1.2 0.1" class="interactuable" geometry="primitive: plane; width: 2; height: 0.5" material="color: #27ae60">
          <a-text value="CORTAR PARA INICIAR" align="center" position="0 0 0.02" width="5" color="#FFFFFF"></a-text>
        </a-entity>
      </a-entity>

    </a-scene>
  </body>
</html>
