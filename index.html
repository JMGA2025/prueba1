<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bienvenido - Aula ATECA</title>
  
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">
  
  <style>
    body { margin: 0; overflow: hidden; background: #000; font-family: 'Montserrat', sans-serif; }
    #pantalla-inicio { position: fixed; inset: 0; z-index: 999; background: radial-gradient(circle at center, #0a0a2a 0%, #000000 100%); display: flex; flex-direction: column; align-items: center; justify-content: center; color: #fff; text-align: center; padding: 20px; transition: opacity 1s ease-in-out; }
    #pantalla-inicio::before { content: ''; position: absolute; inset: 0; background-image: radial-gradient(rgba(255,255,255,0.1) 1px, transparent 1px); background-size: 60px 60px; animation: drift 30s linear infinite; opacity: 0.4; pointer-events: none; }
    @keyframes drift { from { transform: translateY(0); } to { transform: translateY(-60px); } }
    #pantalla-inicio h2 { font-size: 1.5rem; color: #a0a0ff; margin-bottom: 0; font-weight: 300; letter-spacing: 4px; text-transform: uppercase; z-index: 1; }
    #pantalla-inicio h1 { font-family: 'Cinzel', serif; font-size: 4rem; color: #e0d070; margin-top: 0; margin-bottom: 0.5rem; letter-spacing: 8px; text-shadow: 0 0 20px rgba(224, 208, 112, 0.4); z-index: 1; }
    #pantalla-inicio p { color: #bbb; font-size: 1.1rem; margin-bottom: 3rem; line-height: 1.6; z-index: 1; }
    #btn-entrar { padding: 16px 56px; background: rgba(224, 208, 112, 0.05); border: 1px solid #e0d070; border-radius: 50px; color: #e0d070; font-size: 1.2rem; font-family: 'Montserrat', sans-serif; cursor: pointer; letter-spacing: 3px; transition: all 0.4s ease; box-shadow: 0 0 15px rgba(224, 208, 112, 0.1); z-index: 1; }
    #btn-entrar:hover { background: #e0d070; color: #000; box-shadow: 0 0 30px rgba(224, 208, 112, 0.6); transform: scale(1.05); }
  </style>

  <script>
    AFRAME.registerComponent('palabra-interactiva', {
      init: function () {
        var el = this.el;
        var colorOriginal = el.getAttribute('color');

        el.addEventListener('mouseenter', function () {
          el.setAttribute('color', '#f1c40f');
          el.setAttribute('animation__escala', 'property: scale; to: 1.4 1.4 1.4; dur: 150; easing: easeOutQuad');
        });

        el.addEventListener('mouseleave', function () {
          el.setAttribute('color', colorOriginal);
          el.setAttribute('animation__escala', 'property: scale; to: 1 1 1; dur: 150; easing: easeOutQuad');
        });
      }
    });
  </script>
</head>
<body>

<div id="pantalla-inicio">
  <h2>Descubre</h2>
  <h1>AULA ATECA</h1>
  <p>Una experiencia de bienvenida inmersiva<br>
  <small style="font-size: 0.85rem; color:#888; margin-top:10px; display:inline-block;">Asegúrate de tener el volumen encendido. En Quest 3, pulsa el gatillo.</small></p>
  <button id="btn-entrar" onclick="iniciar()">ENTRAR</button>
</div>

<audio id="musica-fondo" src="./ATECA1.mp3" loop></audio>

<a-scene renderer="alpha:false;antialias:true;" background="color:#000005" fog="type: exponential; color: #000010; density: 0.04" webxr="optionalFeatures: hit-test,local-floor,passthrough;" cursor="rayOrigin: mouse" raycaster="objects: .interactable">
  
  <a-sky color="#000005"></a-sky>
  
  <a-cylinder radius="30" height="0.01" position="0 0 0" color="#1a1a3a" opacity="0.1" material="shader: flat;"></a-cylinder>
  <a-ring radius-inner="2" radius-outer="2.05" position="0 0.01 0" rotation="-90 0 0" color="#4455aa" opacity="0.3"></a-ring>
  
  <a-light type="ambient" color="#111122"></a-light>
  <a-light type="point" position="0 3 0" color="#4455aa" intensity="0.4"></a-light>

  <a-entity id="estrellas"></a-entity>
  <a-entity id="particulas-magicas"></a-entity>

  <!-- NUBE DE PALABRAS: Ahora orbitan en un radio fijo (z) rotando sobre el eje Y -->
  <a-entity id="nube-palabras" position="0 1.6 0">
    <a-entity animation="property: rotation; from: 0 0 0; to: 0 360 0; loop: true; dur: 18000; easing: linear">
      <a-text value="¡Bienvenido/a!" class="interactable" palabra-interactiva position="0 0.2 -1.8" color="#ffffff" width="3.2" align="center" geometry="primitive: plane; width: 1.5; height: 0.5" material="visible: false"></a-text>
    </a-entity>
    <a-entity animation="property: rotation; from: 0 45 0; to: 0 -315 0; loop: true; dur: 22000; easing: linear">
      <a-text value="¡Welcome!" class="interactable" palabra-interactiva position="0 0.5 -1.6" color="#f0f0f0" width="2.6" align="center" geometry="primitive: plane; width: 1.2; height: 0.5" material="visible: false"></a-text>
    </a-entity>
    <a-entity animation="property: rotation; from: 0 90 0; to: 0 450 0; loop: true; dur: 25000; easing: linear">
      <a-text value="¡Bienvenue!" class="interactable" palabra-interactiva position="0 -0.2 -1.7" color="#ffffff" width="2.4" align="center" geometry="primitive: plane; width: 1.2; height: 0.5" material="visible: false"></a-text>
    </a-entity>
    <a-entity animation="property: rotation; from: 0 135 0; to: 0 -225 0; loop: true; dur: 20000; easing: linear">
      <a-text value="¡Willkommen!" class="interactable" palabra-interactiva position="0 0.8 -1.5" color="#eeeeee" width="2.1" align="center" geometry="primitive: plane; width: 1.0; height: 0.5" material="visible: false"></a-text>
    </a-entity>
    <a-entity animation="property: rotation; from: 0 180 0; to: 0 540 0; loop: true; dur: 28000; easing: linear">
      <a-text value="¡Benvenuto/a!" class="interactable" palabra-interactiva position="0 -0.5 -1.6" color="#f5f5f5" width="2.3" align="center" geometry="primitive: plane; width: 1.2; height: 0.5" material="visible: false"></a-text>
    </a-entity>
    <a-entity animation="property: rotation; from: 0 225 0; to: 0 -135 0; loop: true; dur: 19000; easing: linear">
      <a-text value="¡Bem-vindo/a!" class="interactable" palabra-interactiva position="0 0.4 -1.9" color="#ffffff" width="2.2" align="center" geometry="primitive: plane; width: 1.2; height: 0.5" material="visible: false"></a-text>
    </a-entity>
  </a-entity>

  <!-- CARTEL PRINCIPAL -->
  <a-entity id="aula-ateca" position="0 1.8 -30" visible="false">
    <a-plane width="5.4" height="2.2" color="#000000" opacity="0.6" material="shader:flat" position="0 0 -0.06"></a-plane>
    <a-light type="point" color="#f1c40f" intensity="1" distance="6" position="0 0 0.5"></a-light>
    <a-plane width="5.0" height="0.03" color="#f1c40f" material="shader:flat; emissive:#f1c40f; emissiveIntensity:2" position="0 0.9 0"></a-plane>
    <a-plane width="5.0" height="0.03" color="#f1c40f" material="shader:flat; emissive:#f1c40f; emissiveIntensity:2" position="0 -0.9 0"></a-plane>
    
    <a-text value="aula" align="center" color="#ffffff" width="6.0" position="0 0.35 0" font="exo2bold"></a-text>
    <a-text value="ATECA" align="center" color="#f1c40f" width="10.5" position="0 -0.30 0" font="exo2bold" material="shader:flat; emissive:#f1c40f; emissiveIntensity:0.5"></a-text>
  </a-entity>

  <!-- PANEL 1: INFORMACIÓN -->
  <a-entity id="panel-info" position="-1.5 1.6 -2.6" rotation="0 15 0" scale="0.01 0.01 0.01" visible="false">
    <a-plane width="2.6" height="2.4" color="#000000" opacity="0.6" material="shader:flat"></a-plane>
    <a-plane width="2.65" height="2.45" color="#f1c40f" material="shader:flat; emissive:#f1c40f; emissiveIntensity:0.5" position="0 0 -0.01"></a-plane>
    
    <!-- Logo más pequeño y reubicado -->
    <a-image src="./LOGO.jpg" position="0 0.85 0.01" width="1.0" height="0.5"></a-image>

    <!-- Título bajado ligeramente -->
    <a-text value="NUESTRA AULA ATECA" align="center" color="#ffffff" width="3.0" position="0 0.35 0.01" font="exo2bold"></a-text>
    
    <!-- Texto principal más separado del título -->
    <a-text value="Este espacio nace como una apuesta por la\ninnovacion y la digitalizacion. \n\nUn entorno disenado para transformar la\nmanera en la que aprendemos y creamos, \nfusionando la tecnologia con la creatividad.\n\n¡Disfruta de la experiencia inmersiva!" align="center" color="#dddddd" width="2.4" position="0 -0.40 0.01" line-height="55"></a-text>
  </a-entity>

  <!-- PANEL 2: EQUIPAMIENTO -->
  <a-entity id="panel-equipamiento" position="1.5 1.6 -2.6" rotation="0 -15 0" scale="0.01 0.01 0.01" visible="false">
    <a-plane width="2.6" height="2.4" color="#000000" opacity="0.6" material="shader:flat"></a-plane>
    <a-plane width="2.65" height="2.45" color="#4455aa" material="shader:flat; emissive:#4455aa; emissiveIntensity:0.5" position="0 0 -0.01"></a-plane>
    
    <!-- Título reubicado más arriba para que no solape -->
    <a-text value="¿QUE ENCONTRARAS AQUI?" align="center" color="#f1c40f" width="3.0" position="0 0.95 0.01" font="exo2bold"></a-text>
    
    <!-- Texto principal con exclamaciones claras y bajado un poco -->
    <a-text value="Disponemos de tecnologia punta para\ntu aprendizaje:\n\n* Simuladores de Soldeo\n\n* Visores de Realidad Virtual (VR)\n\n* Realidad Mixta (XR)\n\n* Un potente escaner 3D\n\n¡...Y esperamos que pronto\n tengamos alguna cosa mas!" align="left" color="#ffffff" width="2.4" position="-1.1 -0.05 0.01" line-height="55"></a-text>
  </a-entity>

  <!-- Cámara y Controles VR (Corrección del raycaster) -->
  <a-entity id="rig">
    <a-camera position="0 1.6 0" look-controls="pointerLockEnabled: false" wasd-controls></a-camera>
    
    <!-- Aseguramos que los láseres apunten solo a la clase 'interactable' -->
    <a-entity laser-controls="hand:left" raycaster="objects: .interactable; far:10; showLine: true" line="color: #f1c40f; opacity: 0.5"></a-entity>
    <a-entity laser-controls="hand:right" raycaster="objects: .interactable; far:10; showLine: true" line="color: #f1c40f; opacity: 0.5"></a-entity>
  </a-entity>

</a-scene>

<script>
  let musicaIniciada = false;

  function iniciarReproductorMP3() {
    if (musicaIniciada) return;
    musicaIniciada = true;
    const audioFondo = document.getElementById('musica-fondo');
    audioFondo.volume = 0.6; 
    audioFondo.play().catch(function(error) { console.log("Esperando interacción para audio..."); });
  }

  function crearEstrellas() {
    const contenedorEstrellas = document.getElementById('estrellas');
    const contenedorParticulas = document.getElementById('particulas-magicas');

    for (let i = 0; i < 250; i++) {
      const estrella = document.createElement('a-sphere');
      const radioEsfera = 18 + Math.random() * 10;
      const t = Math.random() * Math.PI * 2;
      const p = Math.random() * Math.PI;
      estrella.setAttribute('position', { x: radioEsfera * Math.sin(p) * Math.cos(t), y: radioEsfera * Math.cos(p), z: radioEsfera * Math.sin(p) * Math.sin(t) });
      estrella.setAttribute('radius', 0.015 + Math.random() * 0.04);
      const brillo = Math.floor(180 + Math.random() * 75);
      estrella.setAttribute('material', `color:rgb(${brillo},${brillo},${brillo}); emissive:rgb(${brillo},${brillo},${brillo}); emissiveIntensity:1; shader:flat`);
      contenedorEstrellas.appendChild(estrella);
    }

    for (let i = 0; i < 35; i++) {
      const particula = document.createElement('a-sphere');
      const x = (Math.random() - 0.5) * 12;
      const y = Math.random() * 6;
      const z = (Math.random() - 0.5) * 12;
      particula.setAttribute('position', `${x} ${y} ${z}`);
      particula.setAttribute('radius', 0.01 + Math.random() * 0.02);
      const color = Math.random() > 0.5 ? '#88aaff' : '#f1c40f';
      particula.setAttribute('material', `color:${color}; emissive:${color}; emissiveIntensity:0.5; shader:flat; transparent:true; opacity: 0.8`);
      particula.setAttribute('animation__y', `property: position.y; from: ${y}; to: ${y + 1.5}; loop: true; dir: alternate; dur: ${10000 + Math.random() * 10000}; easing: easeInOutSine`);
      particula.setAttribute('animation__x', `property: position.x; from: ${x}; to: ${x + 0.5}; loop: true; dir: alternate; dur: ${8000 + Math.random() * 8000}; easing: easeInOutSine`);
      particula.setAttribute('animation__opacidad', `property: components.material.material.opacity; from: 0.2; to: 0.9; loop: true; dir: alternate; dur: ${2000 + Math.random() * 3000}; easing: easeInOutSine`);
      contenedorParticulas.appendChild(particula);
    }
  }

  function mostrarPanelesInfo() {
    const panelInfo = document.getElementById('panel-info');
    const panelEquipamiento = document.getElementById('panel-equipamiento');

    panelInfo.setAttribute('visible', 'true');
    panelEquipamiento.setAttribute('visible', 'true');

    panelInfo.setAttribute('animation__escala', { property: 'scale', from: '0.01 0.01 0.01', to: '1 1 1', dur: 2000, easing: 'easeOutElastic' });
    panelEquipamiento.setAttribute('animation__escala', { property: 'scale', from: '0.01 0.01 0.01', to: '1 1 1', dur: 2000, delay: 500, easing: 'easeOutElastic' });
  }

  function lanzarAulaAteca() {
    const cartel = document.getElementById('aula-ateca');
    cartel.setAttribute('visible', 'true');
    cartel.setAttribute('animation__llega', { property: 'position', from: '0 1.8 -30', to: '0 1.8 -2.8', dur: 6000, easing: 'easeOutCubic' });
    cartel.setAttribute('animation__escala', { property: 'scale', from: '0.05 0.05 0.05', to: '1 1 1', dur: 6000, easing: 'easeOutCubic' });
    
    setTimeout(() => {
      cartel.setAttribute('animation__se_va', { property: 'position', from: '0 1.8 -2.8', to: '0 1.8 -30', dur: 2000, easing: 'easeInCubic' });
      cartel.setAttribute('animation__escala_baja', { property: 'scale', from: '1 1 1', to: '0.05 0.05 0.05', dur: 2000, easing: 'easeInCubic' });
    }, 9000);

    setTimeout(mostrarPanelesInfo, 10000);
  }

  function iniciar() {
    const pantalla = document.getElementById('pantalla-inicio');
    pantalla.style.opacity = '0';
    setTimeout(() => { pantalla.style.display = 'none'; }, 1000);
    iniciarReproductorMP3();
    setTimeout(lanzarAulaAteca, 2000);
  }

  document.querySelector('a-scene').addEventListener('enter-vr', () => {
    document.getElementById('pantalla-inicio').style.display = 'none';
    iniciarReproductorMP3();
    setTimeout(lanzarAulaAteca, 2000);
  });

  document.querySelector('a-scene').addEventListener('loaded', crearEstrellas);
</script>
</body>
</html>
