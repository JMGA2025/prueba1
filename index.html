<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flashcards Aula ATECA VR</title>

  <!-- Script principal de A-Frame -->
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>

  <script>
    AFRAME.registerComponent('flashcard-logic', {
      init: function () {
        this.isFlipped = false;
        const hitBox = this.el.querySelector('.interactable');

        // Efecto Hover: Aumentar tamaño
        hitBox.addEventListener('mouseenter', () => {
           this.el.setAttribute('animation__scale', 'property: scale; to: 1.05 1.05 1.05; dur: 200; easing: easeOutQuad');
        });

        hitBox.addEventListener('mouseleave', () => {
           this.el.setAttribute('animation__scale', 'property: scale; to: 1 1 1; dur: 200; easing: easeOutQuad');
        });

        // Efecto Click: Voltear tarjeta de forma más lenta y majestuosa
        hitBox.addEventListener('click', () => {
          this.isFlipped = !this.isFlipped;
          const rotY = this.isFlipped ? 180 : 0;
          // Incrementamos la duración a 1200ms y cambiamos el easing a 'easeInOutCubic' para un giro suave
          this.el.setAttribute('animation__flip', `property: rotation; to: 0 ${rotY} 0; dur: 1200; easing: easeInOutCubic`);
        });
      }
    });

    AFRAME.registerComponent('flashcard-board-generator', {
      init: function() {
        // Datos de las tarjetas referenciando tus imágenes PNG
        const cardsData = [
          { front: "panel-01-a.png", back: "panel-01-b.png" },
          { front: "panel-02-a.png", back: "panel-02-b.png" },
          { front: "panel-03-a.png", back: "panel-03-b.png" },
          { front: "panel-04-a.png", back: "panel-04-b.png" },
          { front: "panel-05-a.png", back: "panel-05-b.png" }
        ];

        let htmlContent = '';
        const radius = 3.5;
        const heights = [2.2, 0.8];  // 2 filas

        cardsData.forEach((data, index) => {
          let row, angleDeg;
          
          // Distribución balanceada para 5 paneles: 3 arriba, 2 abajo centrados
          if (index < 3) {
            row = 0;
            const anglesRow0 = [-35, 0, 35];
            angleDeg = anglesRow0[index];
          } else {
            row = 1;
            const anglesRow1 = [-17.5, 17.5];
            angleDeg = anglesRow1[index - 3];
          }
          
          const angleRad = angleDeg * (Math.PI / 180);
          
          const x = radius * Math.sin(angleRad);
          const z = -radius * Math.cos(angleRad);
          const y = heights[row];
          const animDelay = Math.random() * 1000;

          // Construimos el HTML de cada tarjeta usando a-image
          htmlContent += `
            <a-entity position="${x} ${y} ${z}" rotation="0 ${-angleDeg} 0" 
                      animation__float="property: position; to: ${x} ${y + 0.1} ${z}; dir: alternate; loop: true; dur: 3000; delay: ${animDelay}; easing: easeInOutSine">
              
              <a-entity flashcard-logic>
                <!-- Cara Frontal (Imagen PNG) -->
                <a-image src="${data.front}" width="1.6" height="1" position="0 0 0.01"></a-image>

                <!-- Cara Trasera (Imagen PNG) -->
                <a-image src="${data.back}" width="1.6" height="1" position="0 0 -0.01" rotation="0 180 0"></a-image>

                <!-- Hitbox invisible para detectar clics y láser -->
                <a-box class="interactable" width="1.6" height="1" depth="0.1" material="visible: false"></a-box>
              </a-entity>
            </a-entity>
          `;
        });

        this.el.innerHTML = htmlContent;
      }
    });
  </script>
</head>
<body>

<a-scene renderer="alpha:false;antialias:true;" background="color:#050814" fog="type: exponential; color: #050814; density: 0.05" webxr="optionalFeatures: hit-test,local-floor,passthrough;">
  
  <a-light type="ambient" color="#1a2b4c"></a-light>
  <a-light type="point" position="0 3 0" color="#7dd3fc" intensity="0.5"></a-light>
  <a-light type="point" position="0 0.5 2" color="#ffffff" intensity="0.2"></a-light>

  <!-- Decoración del Entorno -->
  <a-cylinder radius="30" height="0.01" position="0 0 0" color="#0b1020" material="shader: flat; roughness: 1"></a-cylinder>
  <a-ring radius-inner="3.4" radius-outer="3.6" position="0 0.01 0" rotation="-90 0 0" color="#7dd3fc" opacity="0.3"></a-ring>

  <!-- Título Principal 3D -->
  <a-text value="Nuestra Aula ATECA" align="center" position="0 3.8 -4" color="#f1c40f" width="8"></a-text>
  <a-text value="Apunta y haz clic para voltear las tarjetas" align="center" position="0 3.4 -4" color="#888888" width="4"></a-text>

  <!-- Contenedor donde se generan las Flashcards dinámicas -->
  <a-entity id="flashcard-board" flashcard-board-generator></a-entity>

  <!-- Cámara y Controles VR -->
  <a-entity id="rig">
    <a-camera position="0 1.6 0" look-controls="pointerLockEnabled: false" wasd-controls>
      <a-entity cursor="rayOrigin: mouse" raycaster="objects: .interactable"></a-entity>
    </a-camera>
    
    <a-entity laser-controls="hand:left" raycaster="objects: .interactable; far:10" line="color: #f1c40f; opacity: 0.5"></a-entity>
    <a-entity laser-controls="hand:right" raycaster="objects: .interactable; far:10" line="color: #f1c40f; opacity: 0.5"></a-entity>
  </a-entity>

</a-scene>

</body>
</html>
