<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flashcards Aula ATECA VR</title>

  <!-- Script principal de A-Frame -->
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>

  <script>
    // --- LÓGICA DE CONTROL DE MÚSICA ---
    AFRAME.registerComponent('audio-controller', {
      init: function() {
        this.audioEl = document.getElementById('bgMusic');
        this.isPlaying = false;
        
        const hitBox = this.el.querySelector('.interactable');
        const textEl = this.el.querySelector('a-text');

        // Efectos visuales al apuntar al botón
        hitBox.addEventListener('mouseenter', () => {
          this.el.setAttribute('animation__scale', 'property: scale; to: 1.05 1.05 1.05; dur: 200');
        });
        hitBox.addEventListener('mouseleave', () => {
          this.el.setAttribute('animation__scale', 'property: scale; to: 1 1 1; dur: 200');
        });

        // Alternar Música ON / OFF
        hitBox.addEventListener('click', () => {
          if (this.isPlaying) {
            this.audioEl.pause();
            textEl.setAttribute('value', 'Audio: OFF (Haz clic)');
            textEl.setAttribute('color', '#f1c40f'); // Amarillo
          } else {
            this.audioEl.play();
            textEl.setAttribute('value', 'Audio: ON');
            textEl.setAttribute('color', '#2ecc71'); // Verde
          }
          this.isPlaying = !this.isPlaying;
        });
      }
    });

    // --- LÓGICA DE VOLTEO DE TARJETAS ---
    AFRAME.registerComponent('flashcard-logic', {
      init: function () {
        this.isFlipped = false;
        const hitBox = this.el.querySelector('.interactable');

        // Efecto Hover: Aumentar tamaño
        hitBox.addEventListener('mouseenter', () => {
           this.el.setAttribute('animation__scale', 'property: scale; to: 1.05 1.05 1.05; dur: 200; easing: easeOutQuad');
        });

        hitBox.addEventListener('mouseleave', () => {
           this.el.setAttribute('animation__scale', 'property: scale; to: 1 1 1; dur: 200; easing: easeOutQuad');
        });

        // Efecto Click: Voltear tarjeta
        hitBox.addEventListener('click', () => {
          this.isFlipped = !this.isFlipped;
          const rotY = this.isFlipped ? 180 : 0;
          this.el.setAttribute('animation__flip', `property: rotation; to: 0 ${rotY} 0; dur: 1200; easing: easeInOutCubic`);
        });
      }
    });

    // --- LÓGICA GENERADORA DEL CÍRCULO PERFECTO ---
    AFRAME.registerComponent('flashcard-board-generator', {
      init: function() {
        const cardsData = [];
        for (let i = 1; i <= 10; i++) {
          let num = i.toString().padStart(2, '0'); // Formato: 01, 02... 10
          cardsData.push({ 
            front: `panel-${num}-a.png`, 
            back: `panel-${num}-b.png` 
          });
        }

        let htmlContent = '';
        const radius = 2.8; // Círculo mucho más cerrado para mayor nitidez e inmersión
        const numCards = 10;
        const y = 1.6; // Bajamos la altura al nivel natural de los ojos

        cardsData.forEach((data, index) => {
          // Separación matemáticamente equidistante (36 grados)
          let angleDeg = index * (360 / numCards);
          const angleRad = angleDeg * (Math.PI / 180);
          
          // CORRECCIÓN MATEMÁTICA CRÍTICA:
          // .toFixed(3) redondea el número y evita la notación científica (ej. 1.22e-16)
          // que provocaba el desplazamiento visual de la tarjeta 6 a 180 grados.
          const x = (radius * Math.sin(angleRad)).toFixed(3);
          const z = (-radius * Math.cos(angleRad)).toFixed(3);
          const animDelay = Math.random() * 1000;

          htmlContent += `
            <a-entity position="${x} ${y} ${z}" rotation="0 ${-angleDeg} 0" 
                      animation__float="property: position; to: ${x} ${y + 0.15} ${z}; dir: alternate; loop: true; dur: 3000; delay: ${animDelay}; easing: easeInOutSine">
              
              <a-entity flashcard-logic>
                <!-- npot: true fuerza a mantener la nitidez original de la imagen -->
                <a-image src="${data.front}" width="1.6" height="1" position="0 0 0.01" material="npot: true"></a-image>
                <a-image src="${data.back}" width="1.6" height="1" position="0 0 -0.01" rotation="0 180 0" material="npot: true"></a-image>
                <a-box class="interactable" width="1.6" height="1" depth="0.1" material="visible: false"></a-box>
              </a-entity>
            </a-entity>
          `;
        });

        this.el.innerHTML = htmlContent;
      }
    });
  </script>
</head>
<body>

<!-- colorManagement: true asegura que los colores de las tarjetas no se vean lavados -->
<a-scene renderer="alpha:false; antialias:true; colorManagement:true;" background="color:#050814" fog="type: exponential; color: #050814; density: 0.05" webxr="optionalFeatures: hit-test,local-floor,passthrough;">
  
  <!-- Carga de Archivos (Audio) -->
  <a-assets>
    <audio id="bgMusic" src="ATECA1.mp3" loop preload="auto"></audio>
  </a-assets>

  <a-light type="ambient" color="#1a2b4c"></a-light>
  <a-light type="point" position="0 3 0" color="#7dd3fc" intensity="0.5"></a-light>
  <a-light type="point" position="0 0.5 2" color="#ffffff" intensity="0.2"></a-light>

  <!-- Decoración del Entorno -->
  <a-cylinder radius="30" height="0.01" position="0 0 0" color="#0b1020" material="shader: flat; roughness: 1"></a-cylinder>
  <!-- Adaptamos el anillo luminoso al nuevo radio de las tarjetas -->
  <a-ring radius-inner="2.6" radius-outer="2.8" position="0 0.01 0" rotation="-90 0 0" color="#7dd3fc" opacity="0.3"></a-ring>

  <!-- ORBITADOR: Mueve la foto de un lado a otro (Efecto péndulo flotante) -->
  <a-entity animation="property: rotation; from: 0 -60 0; to: 0 60 0; dir: alternate; loop: true; dur: 20000; easing: easeInOutSine">
    
    <!-- FOTO FLOTANTE DE LA ACTIVIDAD (Estilo Polaroid) -->
    <a-entity position="0 3.2 -4.0" 
              animation__float="property: position; to: 0 3.5 -4.0; dir: alternate; loop: true; dur: 3500; easing: easeInOutSine" 
              animation__rot="property: rotation; from: 0 -10 -5; to: 0 10 5; dir: alternate; loop: true; dur: 4500; easing: easeInOutSine">
      <a-plane width="1.6" height="1.9" color="#ffffff" material="shader: flat; opacity: 0.95"></a-plane>
      <a-image src="foto_aula_1.jpg" width="1.4" height="1.0" position="0 0.25 0.01" material="npot: true"></a-image>
      <a-text value="Trabajando en el Aula" align="center" position="0 -0.6 0.01" color="#333333" width="3" font="mozillavr"></a-text>
    </a-entity>

  </a-entity>

  <!-- Textos Principales y Botón de Audio (Acercados a z = -2.7 para que queden justo sobre la tarjeta central) -->
  <a-entity position="0 0 -2.7">
    <!-- LOGOTIPO DEL CENTRO -->
    <a-image src="LOGO.jpg" width="0.7" height="0.7" position="-2.3 3.2 0" material="npot: true"></a-image>
    
    <a-text value="Nuestra Aula ATECA" align="center" position="0 3.2 0" color="#f1c40f" width="8"></a-text>
    <a-text value="Apunta y haz clic para voltear las tarjetas" align="center" position="0 2.8 0" color="#888888" width="4"></a-text>
    
    <!-- Botón de Mute/Play -->
    <a-entity audio-controller position="0 2.4 0">
      <a-plane class="interactable" width="2" height="0.3" color="#111" material="shader: flat; opacity: 0.8"></a-plane>
      <a-text value="Audio: OFF (Haz clic)" align="center" position="0 0 0.01" color="#f1c40f" scale="0.7 0.7 0.7"></a-text>
    </a-entity>
  </a-entity>

  <!-- Contenedor donde se generan las Flashcards dinámicas -->
  <a-entity id="flashcard-board" flashcard-board-generator></a-entity>

  <!-- Cámara y Controles VR -->
  <a-entity id="rig">
    <a-camera position="0 1.6 0" look-controls="pointerLockEnabled: false" wasd-controls>
      <a-entity cursor="rayOrigin: mouse" raycaster="objects: .interactable"></a-entity>
    </a-camera>
    
    <a-entity laser-controls="hand:left" raycaster="objects: .interactable; far:10" line="color: #f1c40f; opacity: 0.5"></a-entity>
    <a-entity laser-controls="hand:right" raycaster="objects: .interactable; far:10" line="color: #f1c40f; opacity: 0.5"></a-entity>
  </a-entity>

</a-scene>

</body>
</html>
