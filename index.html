<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bienvenido - Aula ATECA</title>
  
  <!-- Script principal de A-Frame -->
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  
  <!-- Fuentes elegantes -->
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">
  
  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: #000;
      font-family: 'Montserrat', sans-serif;
    }

    #pantalla-inicio {
      position: fixed;
      inset: 0;
      z-index: 999;
      background: radial-gradient(circle at center, #0a0a2a 0%, #000000 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #fff;
      text-align: center;
      padding: 20px;
      transition: opacity 1s ease-in-out;
    }

    /* Fondo cósmico animado para la UI */
    #pantalla-inicio::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image: radial-gradient(rgba(255,255,255,0.1) 1px, transparent 1px);
      background-size: 60px 60px;
      animation: drift 30s linear infinite;
      opacity: 0.4;
      pointer-events: none;
    }

    @keyframes drift {
      from { transform: translateY(0); }
      to { transform: translateY(-60px); }
    }

    #pantalla-inicio h2 {
      font-size: 1.5rem;
      color: #a0a0ff;
      margin-bottom: 0;
      font-weight: 300;
      letter-spacing: 4px;
      text-transform: uppercase;
      z-index: 1;
    }

    #pantalla-inicio h1 {
      font-family: 'Cinzel', serif;
      font-size: 4rem;
      color: #e0d070;
      margin-top: 0;
      margin-bottom: 0.5rem;
      letter-spacing: 8px;
      text-shadow: 0 0 20px rgba(224, 208, 112, 0.4);
      z-index: 1;
    }

    #pantalla-inicio p {
      color: #bbb;
      font-size: 1.1rem;
      margin-bottom: 3rem;
      line-height: 1.6;
      z-index: 1;
    }

    #btn-entrar {
      padding: 16px 56px;
      background: rgba(224, 208, 112, 0.05);
      border: 1px solid #e0d070;
      border-radius: 50px;
      color: #e0d070;
      font-size: 1.2rem;
      font-family: 'Montserrat', sans-serif;
      cursor: pointer;
      letter-spacing: 3px;
      transition: all 0.4s ease;
      box-shadow: 0 0 15px rgba(224, 208, 112, 0.1);
      z-index: 1;
    }

    #btn-entrar:hover {
      background: #e0d070;
      color: #000;
      box-shadow: 0 0 30px rgba(224, 208, 112, 0.6);
      transform: scale(1.05);
    }
  </style>

  <script>
    // Registramos un componente personalizado para que las palabras reaccionen
    AFRAME.registerComponent('palabra-interactiva', {
      init: function () {
        var el = this.el;
        var colorOriginal = el.getAttribute('color');

        // Al apuntar con el láser o ratón
        el.addEventListener('mouseenter', function () {
          el.setAttribute('color', '#f1c40f'); // Cambia a dorado
          // Animación de escala (crece un poco)
          el.setAttribute('animation__escala', 'property: scale; to: 1.3 1.3 1.3; dur: 200; easing: easeOutQuad');
        });

        // Al quitar el láser o ratón
        el.addEventListener('mouseleave', function () {
          el.setAttribute('color', colorOriginal); // Vuelve a su color
          // Animación de escala (vuelve a la normalidad)
          el.setAttribute('animation__escala', 'property: scale; to: 1 1 1; dur: 200; easing: easeOutQuad');
        });
      }
    });
  </script>
</head>
<body>

<div id="pantalla-inicio">
  <h2>Descubre</h2>
  <h1>AULA ATECA</h1>
  <p>Una experiencia de bienvenida inmersiva<br>
  <small style="font-size: 0.85rem; color:#888; margin-top:10px; display:inline-block;">Asegúrate de tener el volumen encendido. En Quest 3, pulsa el gatillo.</small></p>
  <button id="btn-entrar" onclick="iniciar()">ENTRAR</button>
</div>

<a-scene renderer="alpha:false;antialias:true;" background="color:#000005" fog="type: exponential; color: #000010; density: 0.04" webxr="optionalFeatures: hit-test,local-floor,passthrough;">
  
  <a-assets>
    <!-- AQUÍ ESTÁ TU REPRODUCTOR MP3 CONFIGURADO CON ATECA1.mp3 -->
    <audio id="musica-fondo" src="./ATECA1.mp3" preload="auto" loop></audio>
  </a-assets>

  <a-sky color="#000005"></a-sky>
  
  <!-- Suelo sutil para evitar mareos en VR (da referencia espacial) -->
  <a-cylinder radius="30" height="0.01" position="0 0 0" color="#1a1a3a" opacity="0.1" material="shader: flat;"></a-cylinder>
  <a-ring radius-inner="2" radius-outer="2.05" position="0 0.01 0" rotation="-90 0 0" color="#4455aa" opacity="0.3"></a-ring>
  
  <!-- Iluminación ambiental para dar volumen -->
  <a-light type="ambient" color="#111122"></a-light>
  <a-light type="point" position="0 3 0" color="#4455aa" intensity="0.4"></a-light>

  <a-entity id="estrellas"></a-entity>
  <a-entity id="particulas-magicas"></a-entity>

  <!-- ══════════════════════════════════════ -->
  <!-- 30 PALABRAS — concentradas en 2x2m     -->

  <!-- ══════════════════════════════════════ -->

    <a-text value="Welcome"        class="interactable" palabra-interactiva position=" 1.1  2.1 -1.4" color="#f0f0f0" width="2.6" align="center" animation="property:rotation; from:5 0 -8;   to:5 -360 -8;  loop:true; dur:22000; easing:linear"></a-text>
    <a-text value="Bienvenue"      class="interactable" palabra-interactiva position="-1.2  1.9 -1.3" color="#ffffff" width="2.4" align="center" animation="property:rotation; from:0 15 0;   to:360 15 0;   loop:true; dur:25000; easing:linear"></a-text>

    <a-text value="أهلاً وسهلاً"  class="interactable" palabra-interactiva position="-0.4  2.3 -1.7" color="#f8f8f8" width="2.5" align="center" animation="property:rotation; from:0 20 0;   to:360 20 0;   loop:true; dur:23000; easing:linear"></a-text>
    <a-text value="欢迎"           class="interactable" palabra-interactiva position=" 1.4  1.5 -1.2" color="#ffffff" width="3.8" align="center" animation="property:rotation; from:10 0 0;   to:10 360 0;   loop:true; dur:17000; easing:linear"></a-text>
    <a-text value="ようこそ"       class="interactable" palabra-interactiva position="-1.4  2.0 -1.1" color="#efefef" width="2.7" align="center" animation="property:rotation; from:0 0 -10;  to:360 0 -10;  loop:true; dur:21000; easing:linear"></a-text>
    <a-text value="환영합니다"     class="interactable" palabra-interactiva position=" 0.5  1.2 -1.8" color="#f0f0f0" width="2.1" align="center" animation="property:rotation; from:-8 0 5;   to:-8 -360 5;  loop:true; dur:26000; easing:linear"></a-text>
    <a-text value="Добро пожаловать" class="interactable" palabra-interactiva position="-1.0 2.8 -1.3" color="#ffffff" width="1.7" align="center" animation="property:rotation; from:0 -15 0;  to:360 -15 0;  loop:true; dur:30000; easing:linear"></a-text>
    <a-text value="Welkom"         class="interactable" palabra-interactiva position=" 1.3  2.4 -1.3" color="#f8f8f8" width="2.7" align="center" animation="property:rotation; from:12 0 0;   to:12 360 0;   loop:true; dur:16000; easing:linear"></a-text>
    <a-text value="Välkommen"      class="interactable" palabra-interactiva position="-0.3  3.1 -1.5" color="#ffffff" width="2.1" align="center" animation="property:rotation; from:0 5 12;   to:360 5 12;   loop:true; dur:24000; easing:linear"></a-text>
    <a-text value="Witamy"         class="interactable" palabra-interactiva position=" 1.0  1.8 -1.6" color="#eeeeee" width="2.7" align="center" animation="property:rotation; from:-6 0 -5;  to:-6 -360 -5; loop:true; dur:27000; easing:linear"></a-text>
    <a-text value="Hoş geldiniz"   class="interactable" palabra-interactiva position="-1.3  1.4 -1.4" color="#f5f5f5" width="2.0" align="center" animation="property:rotation; from:0 0 -12;  to:360 0 -12;  loop:true; dur:22000; easing:linear"></a-text>
    <a-text value="स्वागत है"      class="interactable" palabra-interactiva position=" 0.2  0.9 -1.7" color="#ffffff" width="2.4" align="center" animation="property:rotation; from:6 0 0;    to:6 360 0;    loop:true; dur:19000; easing:linear"></a-text>
    <a-text value="Καλώς ήρθες"   class="interactable" palabra-interactiva position="-1.0  1.6 -1.5" color="#f0f0f0" width="2.1" align="center" animation="property:rotation; from:0 -8 8;   to:360 -8 8;   loop:true; dur:31000; easing:linear"></a-text>
    <a-text value="ברוך הבא"      class="interactable" palabra-interactiva position=" 1.2  2.7 -1.4" color="#ffffff" width="2.3" align="center" animation="property:rotation; from:-5 0 -5;  to:-5 -360 -5; loop:true; dur:20000; easing:linear"></a-text>
    <a-text value="Ongi etorri"    class="interactable" palabra-interactiva position="-1.2  2.5 -1.2" color="#f8f8f8" width="2.0" align="center" animation="property:rotation; from:0 0 10;   to:360 0 10;   loop:true; dur:23000; easing:linear"></a-text>
    <a-text value="Benvingut/da"   class="interactable" palabra-interactiva position=" 0.4  3.0 -1.4" color="#eeeeee" width="1.9" align="center" animation="property:rotation; from:10 5 0;   to:10 -355 0;  loop:true; dur:18000; easing:linear"></a-text>
    <a-text value="Benvido/a"      class="interactable" palabra-interactiva position="-0.6  1.3 -1.6" color="#ffffff" width="2.2" align="center" animation="property:rotation; from:0 25 0;   to:360 25 0;   loop:true; dur:25000; easing:linear"></a-text>
    <a-text value="Bun venit"      class="interactable" palabra-interactiva position=" 1.0  3.2 -1.3" color="#f5f5f5" width="2.2" align="center" animation="property:rotation; from:-10 0 0;  to:-10 360 0;  loop:true; dur:21000; easing:linear"></a-text>
    <a-text value="Vítejte"        class="interactable" palabra-interactiva position="-1.5  1.8 -1.0" color="#ffffff" width="2.6" align="center" animation="property:rotation; from:0 -5 -10; to:360 -5 -10; loop:true; dur:28000; easing:linear"></a-text>
    <a-text value="Üdvözöljük"     class="interactable" palabra-interactiva position=" 0.7  1.0 -1.7" color="#f0f0f0" width="2.1" align="center" animation="property:rotation; from:7 0 7;    to:7 360 7;    loop:true; dur:17000; easing:linear"></a-text>
    <a-text value="Ласкаво просимо" class="interactable" palabra-interactiva position="-0.7 3.3 -1.4" color="#ffffff" width="1.6" align="center" animation="property:rotation; from:0 0 -12;  to:360 0 -12;  loop:true; dur:33000; easing:linear"></a-text>
    <a-text value="Selamat datang"  class="interactable" palabra-interactiva position=" 1.4  2.0 -1.1" color="#f8f8f8" width="1.8" align="center" animation="property:rotation; from:-6 0 6;   to:-6 -360 6;  loop:true; dur:22000; easing:linear"></a-text>
    <a-text value="Karibu"         class="interactable" palabra-interactiva position="-0.2  3.4 -1.5" color="#ffffff" width="3.0" align="center" animation="property:rotation; from:0 10 -8;  to:360 10 -8;  loop:true; dur:19000; easing:linear"></a-text>
    <a-text value="خوش آمدید"     class="interactable" palabra-interactiva position=" 1.1  1.3 -1.5" color="#eeeeee" width="2.2" align="center" animation="property:rotation; from:5 -15 0;  to:5 -375 0;   loop:true; dur:26000; easing:linear"></a-text>
    <a-text value="Chào mừng"      class="interactable" palabra-interactiva position="-1.1  1.1 -1.4" color="#f5f5f5" width="2.2" align="center" animation="property:rotation; from:0 0 15;   to:360 0 15;   loop:true; dur:24000; easing:linear"></a-text>
    <a-text value="ยินดีต้อนรับ"   class="interactable" palabra-interactiva position=" 0.0  1.0 -1.9" color="#ffffff" width="2.4" align="center" animation="property:rotation; from:-8 0 -8;  to:-8 360 -8;  loop:true; dur:29000; easing:linear"></a-text>

  <!-- ══════════════════════════════════════ -->
  <!-- AULA ATECA — llega desde el fondo      -->
  <!-- ══════════════════════════════════════ -->
  <a-entity id="aula-ateca" position="0 1.8 -30" visible="false">
    <!-- Fondo semitransparente con brillo -->
    <a-plane width="5.4" height="2.2" color="#000000" opacity="0.6" material="shader:flat" position="0 0 -0.06"></a-plane>
    
    <!-- Luces que acompañan al cartel -->
    <a-light type="point" color="#f1c40f" intensity="1" distance="6" position="0 0 0.5"></a-light>

    <!-- Línea dorada arriba -->
    <a-plane width="5.0" height="0.03" color="#f1c40f" material="shader:flat; emissive:#f1c40f; emissiveIntensity:2" position="0 0.9 0"></a-plane>
    <!-- Línea dorada abajo -->
    <a-plane width="5.0" height="0.03" color="#f1c40f" material="shader:flat; emissive:#f1c40f; emissiveIntensity:2" position="0 -0.9 0"></a-plane>
    
    <!-- "aula" en blanco -->
    <a-text value="aula" align="center" color="#ffffff" width="6.0" position="0 0.35 0" font="exo2bold"></a-text>
    <!-- "ATECA" en amarillo brillante -->
    <a-text value="ATECA" align="center" color="#f1c40f" width="10.5" position="0 -0.30 0" font="exo2bold" material="shader:flat; emissive:#f1c40f; emissiveIntensity:0.5"></a-text>
  </a-entity>

  <!-- Cámara y Controles VR (Modificados para permitir interacción) -->
  <a-entity id="rig">
    <!-- Añadido cursor para que funcione el hover con el ratón en PC -->
    <a-camera position="0 1.6 0" look-controls="pointerLockEnabled: false" wasd-controls>
      <a-entity cursor="rayOrigin: mouse" raycaster="objects: .interactable"></a-entity>
    </a-camera>
    
    <!-- Mandos de Quest configurados para interactuar solo con las palabras -->
    <a-entity laser-controls="hand:left" raycaster="objects: .interactable; far:10"></a-entity>
    <a-entity laser-controls="hand:right" raycaster="objects: .interactable; far:10"></a-entity>
    <a-entity hand-tracking-controls="hand:left"></a-entity>
    <a-entity hand-tracking-controls="hand:right"></a-entity>
  </a-entity>

</a-scene>

<script>
  let musicaIniciada = false;

  function iniciarReproductorMP3() {
    if (musicaIniciada) return;
    musicaIniciada = true;
    
    // Obtenemos el elemento de audio HTML5
    const audioFondo = document.getElementById('musica-fondo');
    audioFondo.volume = 0.6; // Ajusta el volumen aquí (0.0 a 1.0)
    
    // Reproducir
    audioFondo.play().catch(function(error) {
      console.log("El navegador bloqueó el autoplay. El usuario debe interactuar primero.");
    });
  }

  function crearEstrellas() {
    const contenedorEstrellas = document.getElementById('estrellas');
    const contenedorParticulas = document.getElementById('particulas-magicas');

    // Estrellas lejanas
    for (let i = 0; i < 250; i++) {
      const estrella = document.createElement('a-sphere');
      const radioEsfera = 18 + Math.random() * 10;
      const t = Math.random() * Math.PI * 2;
      const p = Math.random() * Math.PI;
      
      estrella.setAttribute('position', {
        x: radioEsfera * Math.sin(p) * Math.cos(t),
        y: radioEsfera * Math.cos(p),
        z: radioEsfera * Math.sin(p) * Math.sin(t)
      });
      
      estrella.setAttribute('radius', 0.015 + Math.random() * 0.04);
      const brillo = Math.floor(180 + Math.random() * 75);
      estrella.setAttribute('material', `color:rgb(${brillo},${brillo},${brillo}); emissive:rgb(${brillo},${brillo},${brillo}); emissiveIntensity:1; shader:flat`);
      
      contenedorEstrellas.appendChild(estrella);
    }

    // Partículas mágicas flotantes de cerca (AHORA CON LATIDO)
    for (let i = 0; i < 35; i++) {
      const particula = document.createElement('a-sphere');
      const x = (Math.random() - 0.5) * 12;
      const y = Math.random() * 6;
      const z = (Math.random() - 0.5) * 12;

      particula.setAttribute('position', `${x} ${y} ${z}`);
      particula.setAttribute('radius', 0.01 + Math.random() * 0.02);
      
      const color = Math.random() > 0.5 ? '#88aaff' : '#f1c40f';
      particula.setAttribute('material', `color:${color}; emissive:${color}; emissiveIntensity:0.5; shader:flat; transparent:true; opacity: 0.8`);
      
      // Movimiento
      particula.setAttribute('animation__y', `property: position.y; from: ${y}; to: ${y + 1.5}; loop: true; dir: alternate; dur: ${10000 + Math.random() * 10000}; easing: easeInOutSine`);
      particula.setAttribute('animation__x', `property: position.x; from: ${x}; to: ${x + 0.5}; loop: true; dir: alternate; dur: ${8000 + Math.random() * 8000}; easing: easeInOutSine`);
      
      // Animación de latido (opacidad) para darle más vida
      particula.setAttribute('animation__opacidad', `property: components.material.material.opacity; from: 0.2; to: 0.9; loop: true; dir: alternate; dur: ${2000 + Math.random() * 3000}; easing: easeInOutSine`);

      contenedorParticulas.appendChild(particula);
    }
  }

  function lanzarAulaAteca() {
    const cartel = document.getElementById('aula-ateca');
    cartel.setAttribute('visible', 'true');

    cartel.setAttribute('animation__llega', {
      property: 'position',
      from: '0 1.8 -30',
      to: '0 1.8 -2.8',
      dur: 7000,
      easing: 'easeOutCubic'
    });
    
    cartel.setAttribute('animation__escala', {
      property: 'scale',
      from: '0.05 0.05 0.05',
      to: '1 1 1',
      dur: 7000,
      easing: 'easeOutCubic'
    });
    
    setTimeout(() => {
      cartel.setAttribute('animation__flota', {
        property: 'position',
        from: '0 1.8 -2.8',
        to: '0 2.05 -2.8',
        dur: 3500,
        direction: 'alternate',
        loop: true,
        easing: 'easeInOutSine'
      });
    }, 7500);
  }

  // ── Iniciar experiencia ───────────────────────────────────────────────
  function iniciar() {
    const pantalla = document.getElementById('pantalla-inicio');
    pantalla.style.opacity = '0';
    setTimeout(() => { pantalla.style.display = 'none'; }, 1000);
    
    iniciarReproductorMP3();
    setTimeout(lanzarAulaAteca, 3500);
  }

  // Quest 3 — arrancar al entrar en VR
  document.querySelector('a-scene').addEventListener('enter-vr', () => {
    document.getElementById('pantalla-inicio').style.display = 'none';
    iniciarReproductorMP3();
    setTimeout(lanzarAulaAteca, 3500);
  });

  document.querySelector('a-scene').addEventListener('loaded', crearEstrellas);
</script>
</body>
</html>
