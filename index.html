    <a-text value="3F" align="center" color="#f1c40f" width="1.3" position="0 0 0.022" font="exo2bold"></a-text>
  </a-entity>

  <a-entity id="disco-4F" class="disco interactuable" data-label="4F" data-target="hueco-4F" position="1.50 1.10 -0.8">
    <a-cylinder radius="0.13" height="0.032" color="#4a4a55" material="emissive:#333340;emissiveIntensity:0.4;metalness:0.7;roughness:0.3" rotation="90 0 0"></a-cylinder>
    <a-text value="4F" align="center" color="#f1c40f" width="1.3" position="0 0 0.022" font="exo2bold"></a-text>
  </a-entity>

  <a-entity id="disco-1G" class="disco interactuable" data-label="1G" data-target="hueco-1G" position="0.20 0.90 -0.7">
    <a-cylinder radius="0.13" height="0.032" color="#4a4a55" material="emissive:#333340;emissiveIntensity:0.4;metalness:0.7;roughness:0.3" rotation="90 0 0"></a-cylinder>
    <a-text value="1G" align="center" color="#f1c40f" width="1.3" position="0 0 0.022" font="exo2bold"></a-text>
  </a-entity>

  <a-entity id="disco-2G" class="disco interactuable" data-label="2G" data-target="hueco-2G" position="-1.20 1.20 -0.9">
    <a-cylinder radius="0.13" height="0.032" color="#4a4a55" material="emissive:#333340;emissiveIntensity:0.4;metalness:0.7;roughness:0.3" rotation="90 0 0"></a-cylinder>
    <a-text value="2G" align="center" color="#f1c40f" width="1.3" position="0 0 0.022" font="exo2bold"></a-text>
  </a-entity>

  <a-entity id="disco-3G" class="disco interactuable" data-label="3G" data-target="hueco-3G" position="1.10 1.55 -1.2">
    <a-cylinder radius="0.13" height="0.032" color="#4a4a55" material="emissive:#333340;emissiveIntensity:0.4;metalness:0.7;roughness:0.3" rotation="90 0 0"></a-cylinder>
    <a-text value="3G" align="center" color="#f1c40f" width="1.3" position="0 0 0.022" font="exo2bold"></a-text>
  </a-entity>

  <a-entity id="disco-4G" class="disco interactuable" data-label="4G" data-target="hueco-4G" position="-0.45 1.80 -1.3">
    <a-cylinder radius="0.13" height="0.032" color="#4a4a55" material="emissive:#333340;emissiveIntensity:0.4;metalness:0.7;roughness:0.3" rotation="90 0 0"></a-cylinder>
    <a-text value="4G" align="center" color="#f1c40f" width="1.3" position="0 0 0.022" font="exo2bold"></a-text>
  </a-entity>

  <!-- ══════════════════════════════════════════ -->
  <!-- ELECTRODO VIDA — arriba a la derecha      -->
  <!-- ══════════════════════════════════════════ -->
  <a-entity id="electrodo" position="0 2.55 -1.8">
    <a-cylinder id="elec-varilla" radius="0.016" height="0.60" rotation="0 0 0" color="#c0c0c0" material="emissive:#999;emissiveIntensity:0.4"></a-cylinder>
    <a-cylinder id="elec-rev"    radius="0.028" height="0.48" rotation="0 0 0" position="0 -0.03 0" color="#e67e22" material="emissive:#e67e22;emissiveIntensity:0.5"></a-cylinder>
    <a-sphere   id="elec-arco"   radius="0.028" position="0 -0.32 0" color="#ffff00" material="emissive:#ffff00;emissiveIntensity:1.0"></a-sphere>
    <a-text value="VIDA" align="center" position="0 0.42 0" width="1.4" color="#e67e22"></a-text>
    <!-- Animación flotante -->
    <a-animation attribute="position" from="0 2.55 -1.8" to="0 2.65 -1.8" dur="1800" direction="alternate" repeat="indefinite" easing="easeInOutSine"></a-animation>
  </a-entity>

  <!-- Cámara -->
  <a-entity id="rig">
    <a-camera position="0 1.6 0" wasd-controls look-controls>
      <a-cursor color="#f1c40f" fuse="false" scale="0.5 0.5 0.5"></a-cursor>
    </a-camera>
    <a-entity laser-controls="hand:left"  raycaster="objects:.interactuable,.hueco;far:6"></a-entity>
    <a-entity laser-controls="hand:right" raycaster="objects:.interactuable,.hueco;far:6"></a-entity>
    <a-entity hand-tracking-controls="hand:left"  raycaster="objects:.interactuable,.hueco;far:4" cursor></a-entity>
    <a-entity hand-tracking-controls="hand:right" raycaster="objects:.interactuable,.hueco;far:4" cursor></a-entity>
  </a-entity>

</a-scene>

<script>
const POS_ORI = {};
let discoSel  = null;
let aciertos  = 0;
let timerSeg  = 0;
let timerInt  = null;
let juegoVivo = false;

function beep(freqs, type, vol) {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    freqs.forEach((f, i) => {
      const o = ctx.createOscillator(), g = ctx.createGain();
      o.connect(g); g.connect(ctx.destination);
      o.frequency.value = f; o.type = type;
      g.gain.setValueAtTime(vol, ctx.currentTime + i * 0.13);
      g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + i * 0.13 + 0.25);
      o.start(ctx.currentTime + i * 0.13);
      o.stop(ctx.currentTime + i * 0.13 + 0.28);
    });
  } catch(e) {}
}
const sndOk    = () => beep([523,659,784,1046], 'sine', 0.3);
const sndFail  = () => beep([200,160], 'sawtooth', 0.25);
const sndClick = () => beep([440], 'sine', 0.12);

function startTimer() {
  timerInt = setInterval(() => {
    timerSeg++;
    const m = String(Math.floor(timerSeg / 60)).padStart(2, '0');
    const s = String(timerSeg % 60).padStart(2, '0');
    document.getElementById('timer-display').textContent = m + ':' + s;
  }, 1000);
}

function showFeedback(msg, ok) {
  const el = document.getElementById('feedback-msg');
  el.textContent = msg;
  el.style.background = ok ? 'rgba(39,174,96,0.9)' : 'rgba(231,76,60,0.9)';
  el.style.color = '#fff';
  el.style.opacity = '1';
  setTimeout(() => { el.style.opacity = '0'; }, 2200);
}

function apagarElectrodo() {
  document.getElementById('elec-varilla').setAttribute('material','color:#222;emissive:#000;emissiveIntensity:0');
  document.getElementById('elec-rev').setAttribute('material','color:#111;emissive:#000;emissiveIntensity:0');
  document.getElementById('elec-arco').setAttribute('visible','false');
  document.getElementById('electrodo').setAttribute('animation__caida',{
    property:'rotation', to:'0 0 -100', dur:700, easing:'easeInQuad'
  });
  document.getElementById('vida-display').textContent = '💀';
}

function gameOver() {
  clearInterval(timerInt); juegoVivo = false;
  apagarElectrodo(); sndFail();
  setTimeout(() => {
    document.getElementById('overlay-gameover').style.display = 'flex';
  }, 1400);
}

function victoria() {
  clearInterval(timerInt); juegoVivo = false;
  sndOk(); setTimeout(sndOk, 500);
  const m = String(Math.floor(timerSeg / 60)).padStart(2,'0');
  const s = String(timerSeg % 60).padStart(2,'0');
  document.getElementById('msg-tiempo').textContent = '⏱ Tiempo: ' + m + ':' + s;
  document.getElementById('elec-arco').setAttribute('animation__brillo',{
    property:'scale', from:'1 1 1', to:'3 3 3',
    dur:300, easing:'easeOutQuad', dir:'alternate', loop:10
  });
  setTimeout(() => {
    document.getElementById('overlay-victoria').style.display = 'flex';
  }, 2000);
}

document.querySelector('a-scene').addEventListener('loaded', () => {

  document.querySelectorAll('.disco').forEach(d => {
    const p = d.getAttribute('position');
    POS_ORI[d.id] = { x: p.x, y: p.y, z: p.z };

    d.addEventListener('click', e => {
      e.stopPropagation();
      if (!juegoVivo) return;
      sndClick();

      if (discoSel === d) {
        d.querySelector('a-cylinder').setAttribute('material','emissiveIntensity','0.4');
        discoSel = null; return;
      }
      if (discoSel) {
        discoSel.querySelector('a-cylinder').setAttribute('material','emissiveIntensity','0.4');
      }
      discoSel = d;
      d.querySelector('a-cylinder').setAttribute('material','emissiveIntensity','1.0');
    });
  });

  document.querySelectorAll('.hueco').forEach(h => {
    h.addEventListener('click', e => {
      e.stopPropagation();
      if (!juegoVivo || !discoSel || h.dataset.ocupado === 'true') return;

      const correcto = discoSel.dataset.target === h.id;

      if (correcto) {
        sndOk(); aciertos++;
        document.getElementById('progreso').textContent = aciertos + ' / 8';

        const wp = new THREE.Vector3();
        h.object3D.getWorldPosition(wp);
        discoSel.setAttribute('position', { x: wp.x, y: wp.y, z: wp.z + 0.07 });
        discoSel.querySelector('a-cylinder').setAttribute('material',
          'color:#27ae60;emissive:#27ae60;emissiveIntensity:0.9');
        discoSel.setAttribute('animation__ok', {
          property:'scale', from:'1 1 1', to:'1.4 1.4 1.4',
          dur:180, easing:'easeOutQuad', dir:'alternate', loop:4
        });

        const txtEl = document.getElementById('txt-hueco-' + h.dataset.answer);
        if (txtEl) {
          txtEl.setAttribute('value', discoSel.dataset.label);
          txtEl.setAttribute('color', '#27ae60');
          txtEl.setAttribute('opacity', '1');
        }

        h.dataset.ocupado = 'true';
        showFeedback('✓ CORRECTO — ' + discoSel.dataset.label, true);
        discoSel = null;
        if (aciertos === 8) setTimeout(victoria, 800);

      } else {
        sndFail();
        showFeedback('✗ INCORRECTO — ¡Electrodo fundido!', false);

        const ori = POS_ORI[discoSel.id];
        const cur = discoSel.getAttribute('position');
        discoSel.setAttribute('animation__rebote', {
          property:'position',
          from: cur.x + ' ' + cur.y + ' ' + cur.z,
          to:   ori.x + ' ' + ori.y + ' ' + ori.z,
          dur:550, easing:'easeOutBounce'
        });
        discoSel.querySelector('a-cylinder').setAttribute('material','emissiveIntensity','0.4');
        discoSel = null;
        setTimeout(gameOver, 800);
      }
    });
  });

  startTimer();
  juegoVivo = true;
});
</script>
</body>
</html>
