<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <title>Sopa Soldadura 3D Compacta - Aula Ateca</title>
    <!-- Cargamos la última versión estable de A-Frame -->
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script>
      // 1. CONFIGURACIÓN DE TÉRMINOS
      const TERMINOS = ["ZAT", "SAN", "DC-", "DC+", "E7016", "E6013", "BASICO", "RUTILO", "SMAW", "111", "AC", "WPS"];
      let seleccionActual = "";
      let objetosSeleccionados = [];
      let encontrados = 0;

      AFRAME.registerComponent('gestor-sopa', {
        init: function () {
          const el = this.el;
          const letrasTotales = [];
          
          TERMINOS.forEach(t => {
            t.split('').forEach(letra => letrasTotales.push(letra));
          });

          const relleno = "XBYKJHMLWQVR0982";
          for(let i=0; i<30; i++) { // Un poco menos de relleno para compactar
            letrasTotales.push(relleno.charAt(Math.floor(Math.random() * relleno.length)));
          }

          letrasTotales.forEach((letra) => {
            const entidad = document.createElement('a-entity');
            
            // 2. DISPERSIÓN COMPACTA (Cubo de 2x2 metros frente al usuario)
            const x = (Math.random() - 0.5) * 2; // Rango de 2m (-1 a 1)
            const y = Math.random() * 1.2 + 1.0;  // Altura cómoda: de 1m a 2.2m
            const z = (Math.random() - 0.5) * 2 - 1.5; // Profundidad de 2m, centrada a 1.5m de distancia

            entidad.setAttribute('position', {x: x, y: y, z: z});
            entidad.classList.add('interactuable');

            // LA PIEZA
            const placa = document.createElement('a-cylinder');
            placa.setAttribute('rotation', '90 0 0');
            placa.setAttribute('radius', '0.10'); // Ligeramente más pequeñas para que quepan mejor
            placa.setAttribute('height', '0.03');
            placa.setAttribute('material', {
              color: '#2c3e50', // Azul Industrial
              metalness: 0.8,
              roughness: 0.2,
              transparent: true, // Para mejor integración en MR
              opacity: 0.9
            });

            // EL TEXTO
            const texto = document.createElement('a-text');
            texto.setAttribute('value', letra);
            texto.setAttribute('align', 'center');
            texto.setAttribute('width', 3);
            texto.setAttribute('position', '0 0 0.02');
            texto.setAttribute('color', '#FFFFFF');
            texto.setAttribute('font', 'exo2bold');

            entidad.appendChild(placa);
            entidad.appendChild(texto);
            
            entidad.setAttribute('animation', {
              property: 'position',
              dir: 'alternate',
              dur: 2500 + Math.random() * 2000,
              easing: 'easeInOutSine',
              loop: true,
              to: `${x} ${y + 0.10} ${z}`
            });

            entidad.addEventListener('click', () => this.logicaClick(entidad, placa, texto));
            el.appendChild(entidad);
          });
        },

        logicaClick: function(entidad, placa, texto) {
          const letra = texto.getAttribute('value');
          const colorPlaca = placa.getAttribute('material').color;
          
          if (colorPlaca === '#27ae60') return; // Bloquear si ya es correcta

          if (colorPlaca === '#f1c40f') { // DESELECCIONAR
            placa.setAttribute('material', 'color', '#2c3e50');
            const index = objetosSeleccionados.indexOf(entidad);
            if (index > -1) {
              objetosSeleccionados.splice(index, 1);
              seleccionActual = objetosSeleccionados.map(o => o.querySelector('a-text').getAttribute('value')).join('');
            }
          } else { // SELECCIONAR
            placa.setAttribute('material', 'color', '#f1c40f'); // Amarillo
            objetosSeleccionados.push(entidad);
            seleccionActual += letra;
          }

          document.querySelector('#texto-pizarra').setAttribute('value', `FORMANDO: ${seleccionActual}`);

          if (TERMINOS.includes(seleccionActual)) {
            this.confirmarAcierto();
          }
        },

        confirmarAcierto: function() {
          objetosSeleccionados.forEach(o => {
            o.querySelector('a-cylinder').setAttribute('material', 'color', '#27ae60'); // Verde
            o.setAttribute('animation__win', {property: 'scale', to: '1.3 1.3 1.3', dur: 150, dir: 'alternate', loop: 2});
          });
          encontrados++;
          document.querySelector('#contador').setAttribute('value', `ENCONTRADOS: ${encontrados} / ${TERMINOS.length}`);
          
          seleccionActual = "";
          objetosSeleccionados = [];
          setTimeout(() => {
            document.querySelector('#texto-pizarra').setAttribute('value', 'FORMANDO: ...');
          }, 800);
        }
      });
    </script>
  </head>
  <body>
    <!-- 1. CONFIGURACIÓN FORZADA PARA REALIDAD MIXTA -->
    <a-scene 
      gestor-sopa
      xr-mode-ui="enabled: true; enterAREnabled: true; enterVREnabled: false;" 
      renderer="alpha: true; antialias: true; colorManagement: true;"
      embedded>
      
      <!-- Fondo totalmente transparente -->
      <a-sky opacity="0"></a-sky>

      <!-- 3. CÁMARA Y MANDOS VR -->
      <a-entity id="rig">
        <a-camera position="0 1.6 0">
          <!-- Cursor de mirada opcional, fuse desactivado -->
          <a-cursor raycaster="objects: .interactuable" color="#2ecc71" fuse="false" opacity="0.5"></a-cursor>
        </a-camera>
        <!-- Láser controls configurados para usar el gatillo -->
        <a-entity laser-controls="hand: left" raycaster="objects: .interactuable; far: 5"></a-entity>
        <a-entity laser-controls="hand: right" raycaster="objects: .interactuable; far: 5"></a-entity>
      </a-entity>

      <!-- PANTALLA DE CONTROL COMPACTA -->
      <a-entity position="0 2.5 -2">
        <a-plane color="#1a1a1a" width="3" height="0.9" opacity="0.8" material="metalness: 0.5"></a-plane>
        <a-text id="texto-pizarra" value="FORMANDO: ..." align="center" position="0 0.15 0.1" width="4" color="#f1c40f"></a-text>
        <a-text id="contador" value="ENCONTRADOS: 0 / 12" align="center" position="0 -0.2 0.1" width="3" color="#FFFFFF"></a-text>
      </a-entity>

      <!-- BOTÓN DE REINICIO CERCANO -->
      <a-entity position="0.8 0.1 -1" onclick="location.reload()" class="interactuable">
        <a-box color="#c0392b" width="0.4" height="0.1" depth="0.3" material="metalness: 0.7"></a-box>
        <a-text value="REINICIAR" align="center" position="0 0.1 0" rotation="-90 0 0" width="2.5"></a-text>
      </a-entity>

    </a-scene>
  </body>
</html>
